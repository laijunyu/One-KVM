name: Build One-KVM static armhf (all-in-one)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build static binary and package .deb
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              set -e
              # ========== 系统依赖 ==========
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                curl \
                ca-certificates \
                pkg-config \
                git \
                cmake \
                nasm \
                meson \
                ninja-build \
                autoconf \
                automake \
                libtool \
                libclang-dev \
                llvm-dev \
                libasound2-dev \
                libv4l-dev \
                libudev-dev \
                libdrm-dev \
                zlib1g-dev \
                linux-libc-dev \
                xz-utils \
                libva-dev

              # ========== Node.js 22（编译前端） ==========
              NODE_VERSION=22.14.0
              curl -fsSL https://nodejs.org/dist/v\${NODE_VERSION}/node-v\${NODE_VERSION}-linux-armv7l.tar.xz \
                -o /tmp/node.tar.xz
              tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
              rm /tmp/node.tar.xz

              cd /workspace/web
              npm install
              npm run build
              [ ! -d dist ] && echo 'Frontend build failed' && exit 1

              # ========== Rust 工具链 ==========
              cd /workspace
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source \$HOME/.cargo/env
              rustup target add armv7-unknown-linux-gnueabihf

              # ========== 构建静态库（libjpeg, libyuv, libvpx, x264, x265, opus） ==========
              # 1. libjpeg-turbo
              git clone --depth 1 https://github.com/libjpeg-turbo/libjpeg-turbo /tmp/libjpeg-turbo
              cd /tmp/libjpeg-turbo && mkdir build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_SHARED=OFF -DENABLE_STATIC=ON
              make -j\$(nproc) && make install
              cd / && rm -rf /tmp/libjpeg-turbo

              # 2. libyuv
              git clone --depth 1 https://github.com/lemenkov/libyuv /tmp/libyuv
              cd /tmp/libyuv && mkdir build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF
              make -j\$(nproc) && make install
              cd / && rm -rf /tmp/libyuv

              # 创建 libyuv.pc（静态链接 yuv + jpeg）
              mkdir -p /usr/local/lib/pkgconfig
              cat > /usr/local/lib/pkgconfig/libyuv.pc << 'EOF'
              prefix=/usr/local
              exec_prefix=${prefix}
              libdir=${exec_prefix}/lib
              includedir=${prefix}/include
              Name: libyuv
              Description: YUV library
              Version: 1.0.0
              Libs: -L${libdir} -lyuv -ljpeg
              Cflags: -I${includedir}
              EOF

              # 3. libvpx
              git clone --depth 1 https://github.com/webmproject/libvpx /tmp/libvpx
              cd /tmp/libvpx
              ./configure --prefix=/usr/local --enable-static --disable-shared --enable-pic \
                --disable-examples --disable-tools --disable-docs --disable-unit-tests
              make -j\$(nproc) && make install
              cd / && rm -rf /tmp/libvpx

              # 4. libx264
              git clone --depth 1 https://code.videolan.org/videolan/x264.git /tmp/x264
              cd /tmp/x264
              ./configure --prefix=/usr/local --enable-static --disable-shared --enable-pic --disable-cli
              make -j\$(nproc) && make install
              cd / && rm -rf /tmp/x264

              # 5. libx265
              git clone --depth 1 https://bitbucket.org/multicoreware/x265_git /tmp/x265
              cd /tmp/x265/source && mkdir -p build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON
              make -j\$(nproc) && make install
              cd / && rm -rf /tmp/x265

              # 6. libopus
              OPUS_VERSION=1.5.2
              curl -fsSL https://downloads.xiph.org/releases/opus/opus-\${OPUS_VERSION}.tar.gz -o /tmp/opus.tar.gz
              tar -xzf /tmp/opus.tar.gz -C /tmp
              cd /tmp/opus-\${OPUS_VERSION}
              ./configure --prefix=/usr/local --enable-static --disable-shared --enable-pic
              make -j\$(nproc) && make install
              cd / && rm -rf /tmp/opus-\${OPUS_VERSION} /tmp/opus.tar.gz

              # ========== 编译静态 FFmpeg ==========
              FFMPEG_VERSION=5.1.5   # 与 Debian 12 相同的 5.1 系列
              curl -fsSL https://ffmpeg.org/releases/ffmpeg-\${FFMPEG_VERSION}.tar.xz -o /tmp/ffmpeg.tar.xz
              tar -xJf /tmp/ffmpeg.tar.xz -C /tmp
              cd /tmp/ffmpeg-\${FFMPEG_VERSION}
              ./configure \
                --prefix=/usr/local \
                --enable-static \
                --disable-shared \
                --enable-pic \
                --disable-doc \
                --disable-ffplay \
                --disable-ffprobe \
                --enable-libx264 \
                --enable-libx265 \
                --enable-libvpx \
                --enable-libopus \
                --extra-cflags=\"-I/usr/local/include\" \
                --extra-ldflags=\"-L/usr/local/lib\"
              make -j\$(nproc)
              make install
              # 验证 libavcodec 是否存在
              pkg-config --exists libavcodec || { echo 'FFmpeg libavcodec not found'; exit 1; }
              cd / && rm -rf /tmp/ffmpeg-\${FFMPEG_VERSION} /tmp/ffmpeg.tar.xz

              # ========== 环境变量（强制静态链接） ==========
              export PKG_CONFIG_PATH=\"/usr/local/lib/pkgconfig:\$PKG_CONFIG_PATH\"
              export PKG_CONFIG_ALLOW_CROSS=1
              export FFMPEG_STATIC=1
              export LIBYUV_STATIC=1
              export OPUS_STATIC=1
              export CARGO_BUILD_JOBS=2

              # ========== 修复已知编译问题 ==========
              cd /workspace
              # 移除 rkmpp 特性
              sed -i '/rkmpp/d' Cargo.toml
              # 替换缺失的 RKMPP 宏
              find /workspace/libs/hwcodec -name \"*.cpp\" -exec sed -i 's/AV_HWDEVICE_TYPE_RKMPP/AV_HWDEVICE_TYPE_NONE/g' {} \\;
              find /workspace/libs/hwcodec -name \"*.h\" -exec sed -i 's/AV_HWDEVICE_TYPE_RKMPP/AV_HWDEVICE_TYPE_NONE/g' {} \\;

              # 修补 v4l2r AV1 控件缺失问题
              mkdir -p /tmp/v4l2r-fixed
              curl -L https://crates.io/api/v1/crates/v4l2r/0.0.7/download -o /tmp/v4l2r.crate
              tar -xzf /tmp/v4l2r.crate -C /tmp/v4l2r-fixed
              sed -i -e '/av1_film_grain/d' -e '/av1_frame/d' -e '/av1_sequence/d' -e '/av1_tile_group_entry/d' /tmp/v4l2r-fixed/v4l2r-0.0.7/src/controls.rs
              echo '' >> Cargo.toml
              echo '[patch.crates-io]' >> Cargo.toml
              echo 'v4l2r = { path = \"/tmp/v4l2r-fixed/v4l2r-0.0.7\" }' >> Cargo.toml

              # ========== 编译 One-KVM ==========
              cargo build --release --target armv7-unknown-linux-gnueabihf

              BINARY=target/armv7-unknown-linux-gnueabihf/release/one-kvm
              if [ ! -f \"\$BINARY\" ]; then
                echo 'Build failed' && exit 1
              fi

              # ========== 验证静态链接 ==========
              echo 'Checking dynamic symbols (should show only glibc, libdrm, etc., not avcodec):'
              ldd \"\$BINARY\" || true
              echo 'If you see libavcodec in the list above, static link may have failed.'

              # ========== 制作 .deb 包 ==========
              PKG_VER=\$(grep -m1 '^version =' Cargo.toml | cut -d'\"' -f2)
              DEB_DIR=/tmp/one-kvm-deb
              rm -rf \$DEB_DIR
              mkdir -p \$DEB_DIR/DEBIAN
              mkdir -p \$DEB_DIR/usr/bin
              mkdir -p \$DEB_DIR/etc/one-kvm/ventoy
              mkdir -p \$DEB_DIR/lib/systemd/system

              cp \$BINARY \$DEB_DIR/usr/bin/one-kvm
              chmod 755 \$DEB_DIR/usr/bin/one-kvm

              if [ -d /workspace/libs/ventoy-img-rs/resources ]; then
                cp -r /workspace/libs/ventoy-img-rs/resources/* \$DEB_DIR/etc/one-kvm/ventoy/ || true
              fi
              if [ -f /workspace/build/one-kvm.service ]; then
                cp /workspace/build/one-kvm.service \$DEB_DIR/lib/systemd/system/ || true
              fi

              # DEBIAN 控制文件（用 echo，避免缩进问题）
              echo '#!/bin/bash' > \$DEB_DIR/DEBIAN/postinst
              echo 'set -e' >> \$DEB_DIR/DEBIAN/postinst
              echo 'if [ \"\$1\" = \"configure\" ]; then' >> \$DEB_DIR/DEBIAN/postinst
              echo '  if [ -f /lib/systemd/system/one-kvm.service ]; then' >> \$DEB_DIR/DEBIAN/postinst
              echo '    systemctl daemon-reload || true' >> \$DEB_DIR/DEBIAN/postinst
              echo '    systemctl enable one-kvm || true' >> \$DEB_DIR/DEBIAN/postinst
              echo '    systemctl start one-kvm || true' >> \$DEB_DIR/DEBIAN/postinst
              echo '  fi' >> \$DEB_DIR/DEBIAN/postinst
              echo 'fi' >> \$DEB_DIR/DEBIAN/postinst
              echo 'exit 0' >> \$DEB_DIR/DEBIAN/postinst
              chmod 755 \$DEB_DIR/DEBIAN/postinst

              echo '#!/bin/bash' > \$DEB_DIR/DEBIAN/prerm
              echo 'set -e' >> \$DEB_DIR/DEBIAN/prerm
              echo 'if [ \"\$1\" = \"remove\" ] || [ \"\$1\" = \"deconfigure\" ]; then' >> \$DEB_DIR/DEBIAN/prerm
              echo '  if [ -f /lib/systemd/system/one-kvm.service ]; then' >> \$DEB_DIR/DEBIAN/prerm
              echo '    systemctl stop one-kvm || true' >> \$DEB_DIR/DEBIAN/prerm
              echo '    systemctl disable one-kvm || true' >> \$DEB_DIR/DEBIAN/prerm
              echo '  fi' >> \$DEB_DIR/DEBIAN/prerm
              echo 'fi' >> \$DEB_DIR/DEBIAN/prerm
              echo 'exit 0' >> \$DEB_DIR/DEBIAN/prerm
              chmod 755 \$DEB_DIR/DEBIAN/prerm

              echo 'Package: one-kvm' > \$DEB_DIR/DEBIAN/control
              echo \"Version: \${PKG_VER}\" >> \$DEB_DIR/DEBIAN/control
              echo 'Section: admin' >> \$DEB_DIR/DEBIAN/control
              echo 'Priority: optional' >> \$DEB_DIR/DEBIAN/control
              echo 'Architecture: armhf' >> \$DEB_DIR/DEBIAN/control
              echo 'Maintainer: SilentWind' >> \$DEB_DIR/DEBIAN/control
              echo 'Depends: libc6' >> \$DEB_DIR/DEBIAN/control
              echo 'Description: One-KVM (fully static build)' >> \$DEB_DIR/DEBIAN/control
              echo ' Open and lightweight IP-KVM solution.' >> \$DEB_DIR/DEBIAN/control
              echo ' This binary is statically linked against FFmpeg, libyuv, x264, x265, vpx, opus.' >> \$DEB_DIR/DEBIAN/control
              echo 'Homepage: https://github.com/mofeng-git/One-KVM' >> \$DEB_DIR/DEBIAN/control

              dpkg-deb --root-owner-group --build \$DEB_DIR /workspace/one-kvm_armhf_static.deb
              echo 'Static .deb created successfully'
            "

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-static
          path: one-kvm_armhf_static.deb

      - name: Create Release and Upload .deb
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: one-kvm_armhf_static.deb
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            完全静态编译的 armhf 版本。FFmpeg、libyuv、x264、x265、vpx、opus 已全部内嵌，无需安装额外多媒体库。
            在 Debian 12 / Raspberry Pi OS (bookworm) 上直接安装即可运行。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
