name: Build One-KVM for armhf (GLIBC 2.36)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build inside armhf container and package .deb
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              # ---------- 安装系统依赖 ----------
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                curl \
                ca-certificates \
                pkg-config \
                git \
                cmake \
                nasm \
                meson \
                ninja-build \
                autoconf \
                automake \
                libtool \
                libclang-dev \
                llvm-dev \
                libasound2-dev \
                libv4l-dev \
                libudev-dev \
                libdrm-dev \
                zlib1g-dev \
                linux-libc-dev \
                xz-utils

              # ---------- 安装 Node.js 22 LTS (手动下载 armhf 二进制包) ----------
              NODE_VERSION=22.14.0   # 稳定版，可自行更换
              curl -fsSL https://nodejs.org/dist/v\${NODE_VERSION}/node-v\${NODE_VERSION}-linux-armv7l.tar.xz \
                -o /tmp/node.tar.xz
              tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
              rm /tmp/node.tar.xz
              node -v   # 应显示 v22.14.0
              npm -v

              # ---------- 编译前端 Vue 项目 ----------
              cd /workspace/web
              npm install
              npm run build
              if [ ! -d dist ]; then
                echo 'Frontend build failed: dist not found' && exit 1
              fi

              # ---------- 以下与之前完全相同：Rust、静态库、Cargo、打包 ----------
              cd /workspace
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source \$HOME/.cargo/env
              rustup target add armv7-unknown-linux-gnueabihf

              # 静态依赖库构建（libjpeg-turbo, libyuv, libvpx, libx264, libx265）...
              # （此处保持原样，不重复列出）

              # 编译、制作 .deb...
              # （此处保持原样，不重复列出）
            "

      # 后续步骤不变...
