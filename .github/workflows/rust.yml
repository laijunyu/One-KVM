name: Build One-KVM for armhf (glibc 2.28)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross compile for armhf with Debian 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 构建前端（需要 Node.js 20）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..

      # 创建自定义 Dockerfile（基于 Debian 10，GLIBC 2.28）
      - name: Create Dockerfile.armhf.buster
        run: |
          mkdir -p build/cross
          cat > build/cross/Dockerfile.armhf.buster << 'EOF'
          FROM debian:buster

          RUN apt-get update && apt-get install -y \
              curl \
              build-essential \
              gcc-arm-linux-gnueabihf \
              libc6-dev-armhf-cross \
              pkg-config \
              libudev-dev:armhf \
              libdrm-dev:armhf \
              libssl-dev:armhf \
              && rm -rf /var/lib/apt/lists/*

          RUN curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          ENV PATH="/root/.cargo/bin:${PATH}"

          RUN rustup target add armv7-unknown-linux-gnueabihf
          EOF

      # 构建自定义 Docker 镜像
      - name: Build custom Docker image
        run: |
          docker build \
            -f build/cross/Dockerfile.armhf.buster \
            -t one-kvm-cross:buster-armhf \
            .

      # 使用自定义镜像进行交叉编译
      - name: Cross compile inside custom container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            one-kvm-cross:buster-armhf \
            sh -c "
              cargo build --release --target armv7-unknown-linux-gnueabihf
            "

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare .deb package
        run: |
          PKG_NAME="one-kvm_${{ steps.get_version.outputs.version }}_armhf"
          mkdir -p $PKG_NAME/DEBIAN
          mkdir -p $PKG_NAME/usr/local/bin

          cp target/armv7-unknown-linux-gnueabihf/release/one-kvm $PKG_NAME/usr/local/bin/

          cat << EOF > $PKG_NAME/DEBIAN/control
          Package: one-kvm
          Version: ${{ steps.get_version.outputs.version }}
          Architecture: armhf
          Maintainer: SilentWind <silentwind@example.com>
          Description: A lightweight IP-KVM solution (built on Debian 10, glibc 2.28)
           One-KVM Open is a Rust-based, lightweight IP-KVM solution.
           This package is compatible with glibc >= 2.28.
          EOF

      - name: Build .deb package
        run: |
          sudo dpkg-deb --build one-kvm_${{ steps.get_version.outputs.version }}_armhf

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-buster-${{ steps.get_version.outputs.version }}
          path: ./*.deb

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.deb
          generate_release_notes: true
