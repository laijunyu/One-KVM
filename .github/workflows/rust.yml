name: Build one-kvm armhf .deb (GLIBC 2.36)

# 触发条件：推送 v 开头的标签时自动构建，也可以手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 让 x86 的 Runner 能够运行 ARM 容器
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      # 在 Debian 12 (GLIBC 2.36) armhf 环境中编译并打包
      - name: Build inside armhf container and package .deb
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              # ---------- 安装编译依赖 ----------
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                git \
                ca-certificates \
                libdrm-dev \
                libudev-dev \
                pkg-config

              # ★★★ 以下构建命令请根据 one-kvm 实际技术栈调整 ★★★
              # 假设项目使用 Makefile 或者可以直接编译：
              make
              # 如果最终产物名叫 one-kvm，则检查是否存在
              if [ ! -f ./one-kvm ]; then
                echo 'Build failed: one-kvm not found' && exit 1
              fi

              # ---------- 制作 .deb 包 ----------
              PKG_NAME=one-kvm
              PKG_VER=1.0.0   # 可改为从 git tag 自动获取
              DEB_DIR=/tmp/deb

              mkdir -p \$DEB_DIR/usr/local/bin
              cp ./one-kvm \$DEB_DIR/usr/local/bin/

              mkdir -p \$DEB_DIR/DEBIAN
              cat << EOF > \$DEB_DIR/DEBIAN/control
              Package: one-kvm
              Version: \${PKG_VER}
              Section: utils
              Priority: optional
              Architecture: armhf
              Maintainer: your-name <your-email@example.com>
              Description: One-KVM for armhf (GLIBC 2.36)
               This package was built on Debian 12 armhf to ensure
               full compatibility with GLIBC 2.36 systems.
              EOF

              dpkg-deb --root-owner-group --build \$DEB_DIR /workspace/one-kvm_armhf.deb
            "

      # 上传 .deb 作为构建工件（可在 Actions 页面下载）
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-deb
          path: one-kvm_armhf.deb

      # 如果是由 tag 触发，自动创建 Release 并上传 .deb
      - name: Create Release and Upload .deb
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: one-kvm_armhf.deb
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            armhf 架构的 one-kvm .deb 包，在 Debian 12 (GLIBC 2.36) 环境中编译。
            适用于运行 Debian 12 / Raspberry Pi OS (bookworm) 等系统的 ARM 设备。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
