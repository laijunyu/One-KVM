name: Build One-KVM for armhf (full dependencies + clang)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross compile for armhf with Debian 11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..

      - name: Create Dockerfile.armhf.bullseye
        run: |
          mkdir -p build/cross
          cat > build/cross/Dockerfile.armhf.bullseye << 'EOF'
          FROM debian:bullseye

          RUN dpkg --add-architecture armhf && \
              apt-get update && \
              apt-get install -y --no-install-recommends \
                  curl \
                  build-essential \
                  gcc-arm-linux-gnueabihf \
                  libc6-dev-armhf-cross \
                  pkg-config \
                  cmake \
                  autoconf \
                  automake \
                  libtool \
                  ca-certificates \
                  clang \
                  libclang-dev \
                  libasound2-dev:armhf \
                  libopus-dev:armhf \
                  libpulse-dev:armhf \
                  libdrm-dev:armhf \
                  libjpeg62-turbo-dev:armhf \
                  libpng-dev:armhf \
                  libv4l-dev:armhf \
                  libusb-1.0-0-dev:armhf \
                  libudev-dev:armhf \
                  libssl-dev:armhf \
                  libx11-dev:armhf \
                  libxcb-shape0-dev:armhf \
                  libxcb-xfixes0-dev:armhf \
                  libxrandr-dev:armhf \
                  libxinerama-dev:armhf \
                  libxcursor-dev:armhf \
                  libxi-dev:armhf \
                  libgl1-mesa-dev:armhf \
                  libegl1-mesa-dev:armhf \
                  libgles2-mesa-dev:armhf \
              && rm -rf /var/lib/apt/lists/*

          ENV PKG_CONFIG_ALLOW_CROSS=1
          ENV PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
          ENV PKG_CONFIG_SYSROOT_DIR=/

          RUN curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          ENV PATH="/root/.cargo/bin:${PATH}"

          RUN rustup target add armv7-unknown-linux-gnueabihf
          EOF

      - name: Build custom Docker image
        run: |
          docker build \
            -f build/cross/Dockerfile.armhf.bullseye \
            -t one-kvm-cross:bullseye-armhf \
            .

      - name: Cross compile inside custom container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            one-kvm-cross:bullseye-armhf \
            sh -c "
              cargo build --release --target armv7-unknown-linux-gnueabihf
            "

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare .deb package
        run: |
          PKG_NAME="one-kvm_${{ steps.get_version.outputs.version }}_armhf"
          mkdir -p $PKG_NAME/DEBIAN
          mkdir -p $PKG_NAME/usr/local/bin

          cp target/armv7-unknown-linux-gnueabihf/release/one-kvm $PKG_NAME/usr/local/bin/

          cat << EOF > $PKG_NAME/DEBIAN/control
          Package: one-kvm
          Version: ${{ steps.get_version.outputs.version }}
          Architecture: armhf
          Maintainer: SilentWind <silentwind@example.com>
          Description: A lightweight IP-KVM solution (built on Debian 11, glibc 2.31)
           One-KVM Open is a Rust-based, lightweight IP-KVM solution.
           This package is compatible with glibc >= 2.31.
          EOF

      - name: Build .deb package
        run: |
          sudo dpkg-deb --build one-kvm_${{ steps.get_version.outputs.version }}_armhf

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-bullseye-${{ steps.get_version.outputs.version }}
          path: ./*.deb

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.deb
          generate_release_notes: true
