name: Build One-KVM for armhf (Using Cross)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross compile for armhf
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 构建前端静态文件
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..

      # 2. 安装 cross 工具
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # 3. 交叉编译
      - name: Cross Compile
        run: cross build --release --target armv7-unknown-linux-gnueabihf

      # 4. 获取版本号并打包 .deb
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare .deb package
        run: |
          PKG_NAME="one-kvm_${{ steps.get_version.outputs.version }}_armhf"
          mkdir -p $PKG_NAME/DEBIAN
          mkdir -p $PKG_NAME/usr/local/bin

          cp target/armv7-unknown-linux-gnueabihf/release/one-kvm $PKG_NAME/usr/local/bin/

          cat << EOF > $PKG_NAME/DEBIAN/control
          Package: one-kvm
          Version: ${{ steps.get_version.outputs.version }}
          Architecture: armhf
          Maintainer: SilentWind <silentwind@example.com>
          Description: A lightweight IP-KVM solution built for armhf.
          EOF

      - name: Build .deb package
        run: sudo dpkg-deb --build one-kvm_${{ steps.get_version.outputs.version }}_armhf

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-${{ steps.get_version.outputs.version }}
          path: ./*.deb
