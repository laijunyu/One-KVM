name: Build One-KVM for armhf (GLIBC 2.36)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build inside armhf container and package .deb
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              # ---------- 安装系统依赖 ----------
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                curl \
                ca-certificates \
                pkg-config \
                git \
                cmake \
                nasm \
                meson \
                ninja-build \
                autoconf \
                automake \
                libtool \
                libclang-dev \
                llvm-dev \
                libasound2-dev \
                libv4l-dev \
                libudev-dev \
                libdrm-dev \
                zlib1g-dev \
                linux-libc-dev \
                xz-utils \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libswscale-dev \
                libavfilter-dev \
                libavdevice-dev \
                libva-dev \
                libopus-dev

              # ---------- 安装 Node.js 22 LTS ----------
              NODE_VERSION=22.14.0
              curl -fsSL https://nodejs.org/dist/v\${NODE_VERSION}/node-v\${NODE_VERSION}-linux-armv7l.tar.xz \
                -o /tmp/node.tar.xz
              tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
              rm /tmp/node.tar.xz

              # ---------- 编译前端 Vue 项目 ----------
              cd /workspace/web
              npm install
              npm run build
              if [ ! -d dist ]; then
                echo 'Frontend build failed: dist not found' && exit 1
              fi

              # ---------- 安装 Rust 工具链 ----------
              cd /workspace
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source \$HOME/.cargo/env
              rustup target add armv7-unknown-linux-gnueabihf

              # ---------- 构建静态依赖库 ----------
              # 1. libjpeg-turbo
              git clone --depth 1 https://github.com/libjpeg-turbo/libjpeg-turbo /tmp/libjpeg-turbo
              cd /tmp/libjpeg-turbo && mkdir build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_SHARED=OFF -DENABLE_STATIC=ON
              make -j\$(nproc) && make install
              cd /
              rm -rf /tmp/libjpeg-turbo

              # 2. libyuv
              git clone --depth 1 https://github.com/lemenkov/libyuv /tmp/libyuv
              cd /tmp/libyuv && mkdir build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF
              make -j\$(nproc) && make install
              cd /
              rm -rf /tmp/libyuv

              # 创建 libyuv.pc
              mkdir -p /usr/local/lib/pkgconfig
              echo 'prefix=/usr/local' > /usr/local/lib/pkgconfig/libyuv.pc
              echo 'exec_prefix=\${prefix}' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'libdir=\${exec_prefix}/lib' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'includedir=\${prefix}/include' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo '' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'Name: libyuv' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'Description: YUV scaling and conversion library' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'Version: 1.0.0' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'Libs: -L\${libdir} -lyuv' >> /usr/local/lib/pkgconfig/libyuv.pc
              echo 'Cflags: -I\${includedir}' >> /usr/local/lib/pkgconfig/libyuv.pc

              # 3. libvpx
              git clone --depth 1 https://github.com/webmproject/libvpx /tmp/libvpx
              cd /tmp/libvpx
              ./configure --prefix=/usr/local --enable-static --disable-shared --enable-pic \
                --disable-examples --disable-tools --disable-docs --disable-unit-tests
              make -j\$(nproc) && make install
              cd /
              rm -rf /tmp/libvpx

              # 4. libx264
              git clone --depth 1 https://code.videolan.org/videolan/x264.git /tmp/x264
              cd /tmp/x264
              ./configure --prefix=/usr/local --enable-static --disable-shared --enable-pic --disable-cli
              make -j\$(nproc) && make install
              cd /
              rm -rf /tmp/x264

              # 5. libx265
              git clone --depth 1 https://bitbucket.org/multicoreware/x265_git /tmp/x265
              cd /tmp/x265/source && mkdir -p build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON
              make -j\$(nproc) && make install
              cd /
              rm -rf /tmp/x265

              # ---------- 设置编译环境 ----------
              export PKG_CONFIG_PATH=\"/usr/local/lib/pkgconfig:\$PKG_CONFIG_PATH\"
              export PKG_CONFIG_ALLOW_CROSS=1
              export FFMPEG_STATIC=0
              export LIBYUV_STATIC=1
              export OPUS_STATIC=0
              export CARGO_BUILD_JOBS=2

              # ---------- 编译 One-KVM ----------
              cd /workspace
              sed -i '/rkmpp/d' Cargo.toml
              find /workspace/libs/hwcodec -name \"*.cpp\" -exec sed -i 's/AV_HWDEVICE_TYPE_RKMPP/AV_HWDEVICE_TYPE_NONE/g' {} \\;
              find /workspace/libs/hwcodec -name \"*.h\" -exec sed -i 's/AV_HWDEVICE_TYPE_RKMPP/AV_HWDEVICE_TYPE_NONE/g' {} \\;

              # 修补 v4l2r 的 AV1 控件缺失问题
              mkdir -p /tmp/v4l2r-fixed
              curl -L https://crates.io/api/v1/crates/v4l2r/0.0.7/download -o /tmp/v4l2r.crate
              tar -xzf /tmp/v4l2r.crate -C /tmp/v4l2r-fixed
              sed -i -e '/av1_film_grain/d' -e '/av1_frame/d' -e '/av1_sequence/d' -e '/av1_tile_group_entry/d' /tmp/v4l2r-fixed/v4l2r-0.0.7/src/controls.rs
              echo '' >> Cargo.toml
              echo '[patch.crates-io]' >> Cargo.toml
              echo 'v4l2r = { path = \"/tmp/v4l2r-fixed/v4l2r-0.0.7\" }' >> Cargo.toml

              cargo build --release --target armv7-unknown-linux-gnueabihf

              BINARY_PATH=target/armv7-unknown-linux-gnueabihf/release/one-kvm
              if [ ! -f \"\$BINARY_PATH\" ]; then
                echo '=== BUILD FAILED ==='
                find target -maxdepth 3 -type d 2>/dev/null || true
                exit 1
              fi
              echo \"Binary found: \$(ls -lh \$BINARY_PATH)\"

              # ---------- 制作 .deb 包 ----------
              PKG_VER=\$(grep -m1 '^version =' Cargo.toml | cut -d'\"' -f2)
              echo \"Detected version: \$PKG_VER\"

              PKG_DIR=/tmp/one-kvm-pkg
              rm -rf \$PKG_DIR
              mkdir -p \$PKG_DIR/DEBIAN
              mkdir -p \$PKG_DIR/usr/bin
              mkdir -p \$PKG_DIR/etc/one-kvm/ventoy
              mkdir -p \$PKG_DIR/lib/systemd/system

              cp \$BINARY_PATH \$PKG_DIR/usr/bin/one-kvm
              chmod 755 \$PKG_DIR/usr/bin/one-kvm

              if [ -d /workspace/libs/ventoy-img-rs/resources ]; then
                cp -r /workspace/libs/ventoy-img-rs/resources/* \$PKG_DIR/etc/one-kvm/ventoy/ || true
              fi
              if [ -f /workspace/build/one-kvm.service ]; then
                cp /workspace/build/one-kvm.service \$PKG_DIR/lib/systemd/system/ || true
              fi

              echo '#!/bin/bash' > \$PKG_DIR/DEBIAN/postinst
              echo 'set -e' >> \$PKG_DIR/DEBIAN/postinst
              echo 'case \"\$1\" in' >> \$PKG_DIR/DEBIAN/postinst
              echo '  configure)' >> \$PKG_DIR/DEBIAN/postinst
              echo '    if [ -f /lib/systemd/system/one-kvm.service ]; then' >> \$PKG_DIR/DEBIAN/postinst
              echo '      systemctl enable one-kvm || true' >> \$PKG_DIR/DEBIAN/postinst
              echo '      systemctl start one-kvm || true' >> \$PKG_DIR/DEBIAN/postinst
              echo '    fi' >> \$PKG_DIR/DEBIAN/postinst
              echo '    ;;' >> \$PKG_DIR/DEBIAN/postinst
              echo 'esac' >> \$PKG_DIR/DEBIAN/postinst
              echo 'exit 0' >> \$PKG_DIR/DEBIAN/postinst
              chmod 755 \$PKG_DIR/DEBIAN/postinst

              echo '#!/bin/bash' > \$PKG_DIR/DEBIAN/prerm
              echo 'set -e' >> \$PKG_DIR/DEBIAN/prerm
              echo 'case \"\$1\" in' >> \$PKG_DIR/DEBIAN/prerm
              echo '  remove|deconfigure)' >> \$PKG_DIR/DEBIAN/prerm
              echo '    if [ -f /lib/systemd/system/one-kvm.service ]; then' >> \$PKG_DIR/DEBIAN/prerm
              echo '      systemctl stop one-kvm || true' >> \$PKG_DIR/DEBIAN/prerm
              echo '      systemctl disable one-kvm || true' >> \$PKG_DIR/DEBIAN/prerm
              echo '    fi' >> \$PKG_DIR/DEBIAN/prerm
              echo '    ;;' >> \$PKG_DIR/DEBIAN/prerm
              echo 'esac' >> \$PKG_DIR/DEBIAN/prerm
              echo 'exit 0' >> \$PKG_DIR/DEBIAN/prerm
              chmod 755 \$PKG_DIR/DEBIAN/prerm

              echo 'Package: one-kvm' > \$PKG_DIR/DEBIAN/control
              echo \"Version: \${PKG_VER}\" >> \$PKG_DIR/DEBIAN/control
              echo 'Section: admin' >> \$PKG_DIR/DEBIAN/control
              echo 'Priority: optional' >> \$PKG_DIR/DEBIAN/control
              echo 'Architecture: armhf' >> \$PKG_DIR/DEBIAN/control
              echo 'Maintainer: SilentWind' >> \$PKG_DIR/DEBIAN/control
              echo 'Depends: libavcodec58, libavformat58, libavutil56, libswscale5, libavfilter7, libavdevice58, libopus0, libva2, ca-certificates' >> \$PKG_DIR/DEBIAN/control
              echo 'Description: A open and lightweight IP-KVM solution written in Rust' >> \$PKG_DIR/DEBIAN/control
              echo ' Enables BIOS-level remote management of servers and workstations.' >> \$PKG_DIR/DEBIAN/control
              echo ' .' >> \$PKG_DIR/DEBIAN/control
              echo ' One-KVM provides video capture, HID emulation (keyboard/mouse),' >> \$PKG_DIR/DEBIAN/control
              echo ' mass storage device forwarding, and ATX power control for remote' >> \$PKG_DIR/DEBIAN/control
              echo ' server management over IP.' >> \$PKG_DIR/DEBIAN/control
              echo ' .' >> \$PKG_DIR/DEBIAN/control
              echo ' Features:' >> \$PKG_DIR/DEBIAN/control
              echo '  * Hardware-accelerated video encoding (VAAPI)' >> \$PKG_DIR/DEBIAN/control
              echo '  * WebRTC and MJPEG streaming with low latency' >> \$PKG_DIR/DEBIAN/control
              echo '  * USB HID emulation via OTG gadget' >> \$PKG_DIR/DEBIAN/control
              echo '  * Mass storage device for ISO/IMG mounting' >> \$PKG_DIR/DEBIAN/control
              echo '  * ATX power control via GPIO or USB relay' >> \$PKG_DIR/DEBIAN/control
              echo 'Homepage: https://github.com/mofeng-git/One-KVM' >> \$PKG_DIR/DEBIAN/control

              dpkg-deb --root-owner-group --build \$PKG_DIR /workspace/one-kvm_armhf.deb

              if [ -f /workspace/one-kvm_armhf.deb ]; then
                echo '.deb generated successfully'
                ls -lh /workspace/one-kvm_armhf.deb
              else
                echo 'ERROR: .deb not created'
                ls -la /workspace/
                exit 1
              fi
            "

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-deb
          path: one-kvm_armhf.deb

      - name: Create Release and Upload .deb
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: one-kvm_armhf.deb
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            专为 armhf 架构构建的 One-KVM .deb 包，于 Debian 12 (GLIBC 2.36) 环境中编译。
            此版本已包含前端页面，并解决了 GLIBC 版本不匹配问题。
            适用于运行 Debian 12 / Raspberry Pi OS (bookworm) 的 ARM 设备。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
