name: Build One-KVM for armhf (with frontend)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross compile for armhf
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 设置 Node.js 环境（用于构建前端）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 构建前端静态文件（生成 web/dist）
      - name: Build frontend
        run: |
          cd web
          npm ci          # 根据 package-lock.json 安装依赖，没有则用 npm install
          npm run build   # 执行构建脚本，生成 dist 目录
          cd ..

      # 安装 cross（交叉编译工具）
      - name: Install cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      # 使用 cross 交叉编译
      - name: Cross compile
        run: |
          cross build --release --target armv7-unknown-linux-gnueabihf

      # 提取版本号
      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # 准备 .deb 包目录
      - name: Prepare .deb package
        run: |
          PKG_NAME="one-kvm_${{ steps.get_version.outputs.version }}_armhf"
          mkdir -p $PKG_NAME/DEBIAN
          mkdir -p $PKG_NAME/usr/local/bin

          cp target/armv7-unknown-linux-gnueabihf/release/one-kvm $PKG_NAME/usr/local/bin/

          cat << EOF > $PKG_NAME/DEBIAN/control
          Package: one-kvm
          Version: ${{ steps.get_version.outputs.version }}
          Architecture: armhf
          Maintainer: SilentWind <silentwind@example.com>
          Description: A lightweight IP-KVM solution written in Rust
           One-KVM Open is a Rust-based, lightweight IP-KVM solution.
           This package was built for Armbian 12 (armhf) using cross-rs.
          EOF

      # 打包 .deb
      - name: Build .deb package
        run: |
          sudo dpkg-deb --build one-kvm_${{ steps.get_version.outputs.version }}_armhf

      # 上传产物
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-${{ steps.get_version.outputs.version }}
          path: ./*.deb

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.deb
          generate_release_notes: true
