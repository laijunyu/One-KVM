name: Build One-KVM for armhf (no custom Docker)

on:
  push:
    tags:
      - 'v*'                     # 推送版本标签时触发，如 v0.2.0
  workflow_dispatch:             # 支持手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross compile for armhf
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 cross（交叉编译工具）
      - name: Install cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      # 使用 cross 进行交叉编译，目标为 armv7-unknown-linux-gnueabihf
      - name: Cross compile
        run: |
          cross build --release --target armv7-unknown-linux-gnueabihf

      # 提取版本号
      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # 准备 .deb 包目录结构
      - name: Prepare .deb package
        run: |
          PKG_NAME="one-kvm_${{ steps.get_version.outputs.version }}_armhf"
          mkdir -p $PKG_NAME/DEBIAN
          mkdir -p $PKG_NAME/usr/local/bin

          # 复制编译好的二进制文件
          cp target/armv7-unknown-linux-gnueabihf/release/one-kvm $PKG_NAME/usr/local/bin/

          # 写入 DEBIAN/control 文件
          cat << EOF > $PKG_NAME/DEBIAN/control
          Package: one-kvm
          Version: ${{ steps.get_version.outputs.version }}
          Architecture: armhf
          Maintainer: SilentWind <silentwind@example.com>
          Description: A lightweight IP-KVM solution written in Rust
           One-KVM Open is a Rust-based, lightweight IP-KVM solution.
           This package was built for Armbian 12 (armhf) using cross-rs.
          EOF

      # 打包为 .deb
      - name: Build .deb package
        run: |
          sudo dpkg-deb --build one-kvm_${{ steps.get_version.outputs.version }}_armhf

      # 上传 .deb 作为工作流产物
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-armhf-${{ steps.get_version.outputs.version }}
          path: ./*.deb

  # 可选：自动创建 Release 并上传
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.deb
          generate_release_notes: true
