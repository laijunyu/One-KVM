name: Package one-kvm from Release (support zip)

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release 标签，例如 v0.2.0'
        required: true
        default: 'v0.2.0'
      asset-name:
        description: '资产文件名，例如 one-kvm-armhf.zip'
        required: true
        default: 'one-kvm-armhf.zip'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Download asset from Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.event.inputs.release-tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ github.event.inputs.asset-name }}" \
            --dir release-assets

      - name: Extract if archive
        run: |
          cd release-assets
          ASSET="${{ github.event.inputs.asset-name }}"
          if [[ "$ASSET" == *.zip ]]; then
            sudo apt-get update && sudo apt-get install -y unzip
            unzip "$ASSET" -d extracted
          elif [[ "$ASSET" == *.tar.gz ]] || [[ "$ASSET" == *.tgz ]]; then
            mkdir -p extracted
            tar -xzf "$ASSET" -C extracted
          else
            # 假设是单独的可执行文件，直接作为二进制使用
            mkdir -p extracted
            cp "$ASSET" extracted/one-kvm
          fi

      - name: Find one-kvm binary
        id: find-binary
        run: |
          BINARY=$(find release-assets/extracted -type f -executable -name 'one-kvm' | head -1)
          if [ -z "$BINARY" ]; then
            echo "未找到 one-kvm 可执行文件！"
            ls -laR release-assets/extracted
            exit 1
          fi
          echo "binary=$BINARY" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for armhf binary analysis)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Analyze dependencies and package .deb
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              apt-get update
              apt-get install -y --no-install-recommends patchelf

              BINARY=${{ steps.find-binary.outputs.binary }}
              if [ ! -f \"\$BINARY\" ]; then
                echo '找不到二进制文件'
                exit 1
              fi

              PKG_VER=\$(echo '${{ github.event.inputs.release-tag }}' | sed 's/^v//')

              DEB_ROOT=/tmp/one-kvm-deb
              rm -rf \$DEB_ROOT
              mkdir -p \$DEB_ROOT/DEBIAN
              mkdir -p \$DEB_ROOT/usr/bin
              mkdir -p \$DEB_ROOT/usr/lib/one-kvm
              mkdir -p \$DEB_ROOT/lib/systemd/system

              cp \$BINARY \$DEB_ROOT/usr/bin/one-kvm
              chmod 755 \$DEB_ROOT/usr/bin/one-kvm

              # 收集所有动态库
              echo '正在收集依赖...'
              ldd \$DEB_ROOT/usr/bin/one-kvm \
                | grep '=> /' \
                | awk '{print \$3}' \
                | sort -u \
                | while read lib; do
                    cp -v \"\$lib\" \$DEB_ROOT/usr/lib/one-kvm/
                  done

              patchelf --set-rpath '\\\$ORIGIN/../lib/one-kvm' \$DEB_ROOT/usr/bin/one-kvm

              cat > \$DEB_ROOT/DEBIAN/postinst << 'POSTINST_EOF'
              #!/bin/bash
              set -e
              if [ \"\$1\" = \"configure\" ]; then
                if [ -f /lib/systemd/system/one-kvm.service ]; then
                  systemctl daemon-reload || true
                  systemctl enable one-kvm || true
                  systemctl start one-kvm || true
                fi
              fi
              exit 0
              POSTINST_EOF
              chmod 755 \$DEB_ROOT/DEBIAN/postinst

              cat > \$DEB_ROOT/DEBIAN/prerm << 'PRERM_EOF'
              #!/bin/bash
              set -e
              if [ \"\$1\" = \"remove\" ] || [ \"\$1\" = \"deconfigure\" ]; then
                if [ -f /lib/systemd/system/one-kvm.service ]; then
                  systemctl stop one-kvm || true
                  systemctl disable one-kvm || true
                fi
              fi
              exit 0
              PRERM_EOF
              chmod 755 \$DEB_ROOT/DEBIAN/prerm

              cat > \$DEB_ROOT/DEBIAN/control << CONTROL_EOF
              Package: one-kvm
              Version: \${PKG_VER}
              Section: admin
              Priority: optional
              Architecture: armhf
              Maintainer: SilentWind
              Depends: libc6
              Description: One-KVM (self-contained with all dependencies)
               Open and lightweight IP-KVM solution.
               This package includes all required runtime libraries.
              Homepage: https://github.com/mofeng-git/One-KVM
              CONTROL_EOF

              dpkg-deb --root-owner-group --build \$DEB_ROOT /workspace/one-kvm_\${PKG_VER}_armhf.deb
              echo '✅ 打包完成'
            "

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-selfcontained-deb
          path: one-kvm_*_armhf.deb
