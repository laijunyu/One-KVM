name: Package one-kvm from Release (self-contained, final)

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download --repo "${{ github.repository }}" \
            --pattern "one-kvm*.zip" \
            --dir release-assets \
            --clobber

          # 解压 zip → 得到 .deb
          unzip -o release-assets/one-kvm*.zip -d release-assets/deb-pkg

          # 从 .deb 中提取 one-kvm 二进制到 binary 目录
          DEB_FILE=$(find release-assets/deb-pkg -name "*.deb" | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "❌ 未找到 .deb 文件！"
            ls -laR release-assets/deb-pkg
            exit 1
          fi
          mkdir -p binary
          dpkg-deb -x "$DEB_FILE" binary/
          echo "✅ 提取完成"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Package self-contained .deb (armhf container)
        run: |
          mkdir -p output
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              set -e
              echo '=== 1. 安装依赖 ==='
              apt-get update
              apt-get install -y --no-install-recommends \
                patchelf \
                libyuv0 \
                dpkg-dev

              BINARY=/workspace/binary/usr/bin/one-kvm
              if [ ! -f \"\$BINARY\" ]; then
                echo '❌ 未找到 one-kvm 可执行文件！'
                ls -laR /workspace/binary
                exit 1
              fi

              DEB_ROOT=/tmp/one-kvm-deb
              rm -rf \$DEB_ROOT
              mkdir -p \$DEB_ROOT/DEBIAN
              mkdir -p \$DEB_ROOT/usr/bin
              mkdir -p \$DEB_ROOT/usr/lib/one-kvm
              mkdir -p \$DEB_ROOT/lib/systemd/system

              echo '=== 2. 复制二进制 ==='
              cp \$BINARY \$DEB_ROOT/usr/bin/one-kvm
              chmod 755 \$DEB_ROOT/usr/bin/one-kvm

              echo '=== 3. 收集依赖库 ==='
              ldd \$DEB_ROOT/usr/bin/one-kvm \
                | grep '=> /' \
                | awk '{print \$3}' \
                | sort -u \
                | while read lib; do
                    if [ -f \"\$lib\" ]; then
                      cp -v \"\$lib\" \$DEB_ROOT/usr/lib/one-kvm/
                    fi
                  done

              echo '=== 4. 修改 RPATH ==='
              patchelf --set-rpath '\\\$ORIGIN/../lib/one-kvm' \$DEB_ROOT/usr/bin/one-kvm

              echo '=== 5. 生成 DEBIAN 控制文件 ==='

              # postinst
              printf '#!/bin/bash\nset -e\nif [ \"\$1\" = \"configure\" ]; then\n  if [ -f /lib/systemd/system/one-kvm.service ]; then\n    systemctl daemon-reload || true\n    systemctl enable one-kvm || true\n    systemctl start one-kvm || true\n  fi\nfi\nexit 0\n' > \$DEB_ROOT/DEBIAN/postinst
              chmod 755 \$DEB_ROOT/DEBIAN/postinst

              # prerm
              printf '#!/bin/bash\nset -e\nif [ \"\$1\" = \"remove\" ] || [ \"\$1\" = \"deconfigure\" ]; then\n  if [ -f /lib/systemd/system/one-kvm.service ]; then\n    systemctl stop one-kvm || true\n    systemctl disable one-kvm || true\n  fi\nfi\nexit 0\n' > \$DEB_ROOT/DEBIAN/prerm
              chmod 755 \$DEB_ROOT/DEBIAN/prerm

              # control
              printf 'Package: one-kvm\nVersion: 1.0\nSection: admin\nPriority: optional\nArchitecture: armhf\nMaintainer: SilentWind\nDepends: libc6\nDescription: One-KVM (self-contained with all dependencies)\n Open and lightweight IP-KVM solution.\n This package includes all required runtime libraries.\nHomepage: https://github.com/mofeng-git/One-KVM\n' > \$DEB_ROOT/DEBIAN/control

              echo '=== 6. 打包 .deb ==='
              dpkg-deb --root-owner-group --build \$DEB_ROOT /workspace/output/one-kvm_armhf_selfcontained.deb

              echo '=== 7. 验证产物 ==='
              ls -la /workspace/output/
              if [ ! -f /workspace/output/one-kvm_armhf_selfcontained.deb ]; then
                echo '❌ 打包失败：产物不存在！'
                exit 1
              fi
              echo '✅ 打包完成'
            "

      - name: List output directory
        run: |
          echo "输出目录内容："
          ls -la output/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-selfcontained-deb
          path: output/one-kvm_armhf_selfcontained.deb
