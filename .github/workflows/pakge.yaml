name: Package one-kvm from Release (self-contained)

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for armhf binary analysis)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Download latest release asset and package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            arm32v7/debian:bookworm-slim \
            bash -c "
              apt-get update
              apt-get install -y --no-install-recommends \
                curl unzip patchelf jq

              # 获取最新 Release 信息
              API_URL='https://api.github.com/repos/${{ github.repository }}/releases/latest'
              echo '正在获取最新 Release 资产...'

              # 用 jq 匹配第一个 one-kvm*.zip 资产
              ASSET_URL=\$(curl -sL -H \"Authorization: token \${GITHUB_TOKEN}\" \"\${API_URL}\" | jq -r '.assets[] | select(.name | test(\"one-kvm.*\\\\.zip\")) | .browser_download_url' | head -1)

              if [ -z \"\$ASSET_URL\" ]; then
                echo '❌ 未找到匹配 one-kvm*.zip 的资产。当前 Release 包含的资产：'
                curl -sL -H \"Authorization: token \${GITHUB_TOKEN}\" \"\${API_URL}\" | jq -r '.assets[].name'
                exit 1
              fi

              echo \"下载: \$ASSET_URL\"
              curl -sL \"\$ASSET_URL\" -o /workspace/asset.zip

              # 解压
              unzip -o /workspace/asset.zip -d /workspace/extracted

              # 查找 one-kvm 可执行文件
              BINARY=\$(find /workspace/extracted -type f -executable -name 'one-kvm' | head -1)
              if [ -z \"\$BINARY\" ]; then
                echo '❌ 在解压后的文件中未找到 one-kvm 可执行文件！'
                ls -laR /workspace/extracted
                exit 1
              fi

              # 提取版本号（从 zip 文件名中尝试）
              PKG_VER=\$(echo \"\$ASSET_URL\" | grep -oP 'v[0-9.]+' | sed 's/^v//')
              if [ -z \"\$PKG_VER\" ]; then
                PKG_VER='1.0'
              fi

              DEB_ROOT=/tmp/one-kvm-deb
              rm -rf \$DEB_ROOT
              mkdir -p \$DEB_ROOT/DEBIAN
              mkdir -p \$DEB_ROOT/usr/bin
              mkdir -p \$DEB_ROOT/usr/lib/one-kvm
              mkdir -p \$DEB_ROOT/lib/systemd/system

              cp \$BINARY \$DEB_ROOT/usr/bin/one-kvm
              chmod 755 \$DEB_ROOT/usr/bin/one-kvm

              # 收集所有动态库依赖
              echo '正在收集依赖库...'
              ldd \$DEB_ROOT/usr/bin/one-kvm \
                | grep '=> /' \
                | awk '{print \$3}' \
                | sort -u \
                | while read lib; do
                    cp -v \"\$lib\" \$DEB_ROOT/usr/lib/one-kvm/
                  done

              # 修改 RPATH
              patchelf --set-rpath '\$ORIGIN/../lib/one-kvm' \$DEB_ROOT/usr/bin/one-kvm

              # 生成 postinst / prerm / control
              cat > \$DEB_ROOT/DEBIAN/postinst << 'POSTINST_EOF'
              #!/bin/bash
              set -e
              if [ \"\$1\" = \"configure\" ]; then
                if [ -f /lib/systemd/system/one-kvm.service ]; then
                  systemctl daemon-reload || true
                  systemctl enable one-kvm || true
                  systemctl start one-kvm || true
                fi
              fi
              exit 0
              POSTINST_EOF
              chmod 755 \$DEB_ROOT/DEBIAN/postinst

              cat > \$DEB_ROOT/DEBIAN/prerm << 'PRERM_EOF'
              #!/bin/bash
              set -e
              if [ \"\$1\" = \"remove\" ] || [ \"\$1\" = \"deconfigure\" ]; then
                if [ -f /lib/systemd/system/one-kvm.service ]; then
                  systemctl stop one-kvm || true
                  systemctl disable one-kvm || true
                fi
              fi
              exit 0
              PRERM_EOF
              chmod 755 \$DEB_ROOT/DEBIAN/prerm

              cat > \$DEB_ROOT/DEBIAN/control << CONTROL_EOF
              Package: one-kvm
              Version: \${PKG_VER}
              Section: admin
              Priority: optional
              Architecture: armhf
              Maintainer: SilentWind
              Depends: libc6
              Description: One-KVM (self-contained with all dependencies)
               Open and lightweight IP-KVM solution.
               This package includes all required runtime libraries.
              Homepage: https://github.com/mofeng-git/One-KVM
              CONTROL_EOF

              dpkg-deb --root-owner-group --build \$DEB_ROOT /workspace/one-kvm_\${PKG_VER}_armhf.deb
              echo '✅ 打包完成！'
            "

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-selfcontained-deb
          path: one-kvm_*_armhf.deb
