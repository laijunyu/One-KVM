name: Package one-kvm from Release (self-contained, fixed)

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download --repo "${{ github.repository }}" \
            --pattern "one-kvm*.zip" \
            --dir release-assets \
            --clobber

          # 解压 zip → 得到 .deb
          unzip -o release-assets/one-kvm*.zip -d release-assets/deb-pkg

          # 从 .deb 中提取 one-kvm 二进制到 workspace/binary 目录
          DEB_FILE=$(find release-assets/deb-pkg -name "*.deb" | head -1)
          mkdir -p binary
          dpkg-deb -x "$DEB_FILE" binary/

          # 提取版本号
          PKG_VER=$(echo "$DEB_FILE" | grep -oP '\d+\.\d+\.\d+' || echo "1.0")
          echo "PKG_VER=$PKG_VER" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Package into self-contained .deb (inside armhf container)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              apt-get update
              apt-get install -y --no-install-recommends \
                patchelf \
                libyuv0 \
                dpkg-dev

              # 找到宿主机提取出来的 one-kvm 二进制
              BINARY=/workspace/binary/usr/bin/one-kvm
              if [ ! -f \"\$BINARY\" ]; then
                echo '❌ 未找到 one-kvm 可执行文件！'
                ls -laR /workspace/binary
                exit 1
              fi

              PKG_VER='${{ env.PKG_VER }}'
              DEB_ROOT=/tmp/one-kvm-deb
              rm -rf \$DEB_ROOT
              mkdir -p \$DEB_ROOT/DEBIAN
              mkdir -p \$DEB_ROOT/usr/bin
              mkdir -p \$DEB_ROOT/usr/lib/one-kvm
              mkdir -p \$DEB_ROOT/lib/systemd/system

              cp \$BINARY \$DEB_ROOT/usr/bin/one-kvm
              chmod 755 \$DEB_ROOT/usr/bin/one-kvm

              # 收集所有动态库依赖（容器内已安装 libyuv0，所以会被列出）
              echo '正在收集依赖库...'
              ldd \$DEB_ROOT/usr/bin/one-kvm \
                | grep '=> /' \
                | awk '{print \$3}' \
                | sort -u \
                | while read lib; do
                    cp -v \"\$lib\" \$DEB_ROOT/usr/lib/one-kvm/
                  done

              # 修改 RPATH
              patchelf --set-rpath '\\\$ORIGIN/../lib/one-kvm' \$DEB_ROOT/usr/bin/one-kvm

              # 生成 DEBIAN 控制文件
              cat > \$DEB_ROOT/DEBIAN/postinst << 'POSTINST_EOF'
              #!/bin/bash
              set -e
              if [ \"\$1\" = \"configure\" ]; then
                if [ -f /lib/systemd/system/one-kvm.service ]; then
                  systemctl daemon-reload || true
                  systemctl enable one-kvm || true
                  systemctl start one-kvm || true
                fi
              fi
              exit 0
              POSTINST_EOF
              chmod 755 \$DEB_ROOT/DEBIAN/postinst

              cat > \$DEB_ROOT/DEBIAN/prerm << 'PRERM_EOF'
              #!/bin/bash
              set -e
              if [ \"\$1\" = \"remove\" ] || [ \"\$1\" = \"deconfigure\" ]; then
                if [ -f /lib/systemd/system/one-kvm.service ]; then
                  systemctl stop one-kvm || true
                  systemctl disable one-kvm || true
                fi
              fi
              exit 0
              PRERM_EOF
              chmod 755 \$DEB_ROOT/DEBIAN/prerm

              cat > \$DEB_ROOT/DEBIAN/control << CONTROL_EOF
              Package: one-kvm
              Version: \${PKG_VER}
              Section: admin
              Priority: optional
              Architecture: armhf
              Maintainer: SilentWind
              Depends: libc6
              Description: One-KVM (self-contained with all dependencies)
               Open and lightweight IP-KVM solution.
               This package includes all required runtime libraries, including libyuv.
              Homepage: https://github.com/mofeng-git/One-KVM
              CONTROL_EOF

              # 打包到 workspace 目录
              dpkg-deb --root-owner-group --build \$DEB_ROOT /workspace/one-kvm_\${PKG_VER}_armhf.deb
              echo '✅ 打包完成'
            "

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-selfcontained-deb
          path: one-kvm_*_armhf.deb
