name: Build Armbian for Orange Pi Zero (with static IP)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout custom repository (for userpatches)
        uses: actions/checkout@v4
        with:
          path: custom-repo

      - name: Checkout armbian/build
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          ref: main
          path: armbian-build

      - name: Copy userpatches into build directory
        run: |
          cp -r custom-repo/userpatches armbian-build/
          chmod +x armbian-build/userpatches/customize-image.sh

      # 新增步骤：为跨架构编译启用 QEMU 用户态模拟
      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Build Orange Pi Zero minimal image
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD=orangepizero \
            BRANCH=current \
            RELEASE=trixie \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=yes \
            KERNEL_CONFIGURE=no

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangepizero-armbian-static-ip
          path: armbian-build/output/images/*.img
          retention-days: 7
