name: Package FFmpeg dependencies (latest release, Ubuntu 22.04 libs)

on:
  workflow_dispatch:

jobs:
  package-ffmpeg-libs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets

          # 获取最新 Release 的 tag
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          echo "Latest tag: $LATEST_TAG"

          # 下载该 Release 中第一个匹配 one-kvm*.zip 的文件
          gh release download "$LATEST_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "one-kvm*.zip" \
            --dir release-assets \
            --clobber

          # 解压 zip
          unzip -o release-assets/one-kvm*.zip -d release-assets/extracted

          # 提取二进制（兼容 deb 包或裸文件）
          mkdir -p binary
          if ls release-assets/extracted/*.deb 1> /dev/null 2>&1; then
            dpkg-deb -x release-assets/extracted/*.deb binary/
          else
            cp $(find release-assets/extracted -type f -executable | head -1) binary/ || true
          fi

          # 确保 binary 根目录有 one-kvm（方便后续 ldd 验证，可选）
          if [ -f binary/usr/bin/one-kvm ]; then
            cp binary/usr/bin/one-kvm binary/one-kvm
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Download Ubuntu 22.04 libraries and package
        run: |
          mkdir -p ffmpeg-libs

          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bookworm-slim \
            bash -c "
              apt-get update
              apt-get install -y --no-install-recommends curl dpkg-dev

              # Ubuntu 22.04 的 armhf 库包列表（根据之前的 ldd 缺失项）
              # 可随时补充更多需要的包
              UBUNTU_MIRROR='http://ports.ubuntu.com/pool/main'

              # 下载函数
              download_and_extract() {
                  local pkg=\$1
                  local url=\$2
                  echo \"下载: \${pkg}\"
                  curl -sL \"\$url\" -o /tmp/\${pkg}.deb
                  dpkg-deb -x /tmp/\${pkg}.deb /tmp/\${pkg}-extracted
                  # 复制所有 .so 文件到输出目录
                  find /tmp/\${pkg}-extracted -name '*.so*' -exec cp -v {} /workspace/ffmpeg-libs/ \;
                  rm -rf /tmp/\${pkg}.deb /tmp/\${pkg}-extracted
              }

              # 必需的库（libopus, libavutil, libavcodec）
              download_and_extract 'libopus0' \\
                '\${UBUNTU_MIRROR}/o/opus/libopus0_1.3.1-0.1_armhf.deb'
              download_and_extract 'libavutil57' \\
                '\${UBUNTU_MIRROR}/f/ffmpeg/libavutil57_7%3a5.1.3-1ubuntu1_armhf.deb'
              download_and_extract 'libavcodec59' \\
                '\${UBUNTU_MIRROR}/f/ffmpeg/libavcodec59_7%3a5.1.3-1ubuntu1_armhf.deb'

              # 可能还依赖这些（根据 libavcodec59 的依赖链自动补齐）
              download_and_extract 'libswresample4' \\
                '\${UBUNTU_MIRROR}/f/ffmpeg/libswresample4_7%3a5.1.3-1ubuntu1_armhf.deb'
              download_and_extract 'libvpx7' \\
                '\${UBUNTU_MIRROR}/libv/libvpx/libvpx7_1.11.0-2_armhf.deb'
              download_and_extract 'libx264-164' \\
                '\${UBUNTU_MIRROR}/x/x264/libx264-164_0.164.3095+gitbaee400-3_armhf.deb'
              download_and_extract 'libx265-199' \\
                '\${UBUNTU_MIRROR}/x/x265/libx265-199_3.5-2_armhf.deb'

              echo '收集完成，内容如下：'
              ls -la /workspace/ffmpeg-libs/
            "

      - name: Package libraries
        run: |
          tar -czf ffmpeg-libs-latest.tar.gz -C ffmpeg-libs .
          ls -lh ffmpeg-libs-latest.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-libs-latest
          path: ffmpeg-libs-latest.tar.gz
