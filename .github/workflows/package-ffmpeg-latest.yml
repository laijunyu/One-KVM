name: Package FFmpeg dependencies (auto-fix all missing libs)

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          echo "Latest tag: $LATEST_TAG"
          gh release download "$LATEST_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "one-kvm*.zip" \
            --dir release-assets \
            --clobber
          unzip -o release-assets/one-kvm*.zip -d release-assets/extracted
          mkdir -p binary
          if ls release-assets/extracted/*.deb 1> /dev/null 2>&1; then
            dpkg-deb -x release-assets/extracted/*.deb binary/
          else
            cp $(find release-assets/extracted -type f -executable | head -1) binary/one-kvm || true
          fi
          if [ -f binary/usr/bin/one-kvm ]; then
            cp binary/usr/bin/one-kvm binary/one-kvm
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Collect all missing libraries from Ubuntu 22.04
        run: |
          mkdir -p ffmpeg-libs
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/ubuntu:jammy \
            bash -c "
              # 安装分析工具
              apt-get update
              apt-get install -y binutils

              BINARY=/workspace/binary/one-kvm
              if [ ! -f \"\$BINARY\" ]; then
                echo '找不到 one-kvm 二进制' && exit 1
              fi

              # 找出所有缺失的库名
              MISSING_LIBS=\$(ldd \"\$BINARY\" | grep 'not found' | awk '{print \$1}')
              if [ -z \"\$MISSING_LIBS\" ]; then
                echo '没有缺失库！' && exit 0
              fi
              echo \"缺失的库: \$MISSING_LIBS\"

              # 对于每个缺失库，搜索并安装对应的包
              for lib in \$MISSING_LIBS; do
                echo \"正在搜索提供 \$lib 的包...\"
                # 搜索包名
                PKG=\$(apt-cache search \"\$lib\" | awk '{print \$1}' | head -1)
                if [ -n \"\$PKG\" ]; then
                  echo \"安装 \$PKG\"
                  apt-get install -y \$PKG
                else
                  echo \"警告: 未找到提供 \$lib 的包\"
                fi
              done

              # 将新安装的所有 .so 文件复制到输出目录（过滤掉系统原有库）
              # 简单起见，直接复制 /usr/lib/arm-linux-gnueabihf/ 下与多媒体相关的 .so
              find /usr/lib/arm-linux-gnueabihf -name 'libav*' -o -name 'libopus*' -o -name 'libvpx*' -o -name 'libx264*' -o -name 'libx265*' -o -name 'libswresample*' -o -name 'libmp3lame*' -o -name 'libtheora*' -o -name 'libvorbis*' -o -name 'libspeex*' | while read f; do
                cp -v \"\$f\" /workspace/ffmpeg-libs/
              done

              # 验证依赖是否齐全
              export LD_LIBRARY_PATH=/workspace/ffmpeg-libs
              ldd \"\$BINARY\" | grep 'not found' || echo '所有依赖已满足'
            "

      - name: Package libraries
        run: |
          tar -czf ffmpeg-libs-latest.tar.gz -C ffmpeg-libs .
          ls -lh ffmpeg-libs-latest.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-libs-latest
          path: ffmpeg-libs-latest.tar.gz
